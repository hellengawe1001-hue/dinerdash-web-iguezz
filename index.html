<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Diner Dash</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-shell {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #game-frame {
      width: min(100vw, calc(100vh * 1.3333));
      height: min(100vh, calc(100vw / 1.3333));
      max-width: 100vw;
      max-height: 100vh;
      background: #000;
    }

    ruffle-player, embed, object {
      width: 100% !important;
      height: 100% !important;
      display: block;
      border: 0;
    }
  </style>
  <script src="ruffle/ruffle.js"></script>
</head>
<body>
  <div id="game-shell">
    <div id="game-frame">
      <embed src="diner-dash.swf" />
    </div>
  </div>

  <script>
    const shell = document.getElementById("game-shell");

    function fireMouse(type, touch) {
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      if (!target) return;

      target.dispatchEvent(new MouseEvent(type, {
        bubbles: true,
        cancelable: true,
        clientX: touch.clientX,
        clientY: touch.clientY,
        button: 0
      }));
    }

    shell.addEventListener("touchstart", (e) => {
      e.preventDefault();
      fireMouse("mousedown", e.changedTouches[0]);
    }, { passive: false });

    shell.addEventListener("touchmove", (e) => {
      e.preventDefault();
      fireMouse("mousemove", e.changedTouches[0]);
    }, { passive: false });

    shell.addEventListener("touchend", (e) => {
      e.preventDefault();
      fireMouse("mouseup", e.changedTouches[0]);
      fireMouse("click", e.changedTouches[0]);
    }, { passive: false });
  </script>
</body>
</html>
