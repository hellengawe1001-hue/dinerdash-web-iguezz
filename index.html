<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Diner Dash</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-shell {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    /* Adjust this ratio if the game looks too tall or too wide */
    #game-frame {
      width: min(100vw, calc(100vh * 1.3333));
      height: min(100vh, calc(100vw / 1.3333));
      max-width: 100vw;
      max-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    ruffle-player {
      width: 100% !important;
      height: 100% !important;
      display: block;
      border: 0;
      outline: none;
    }
  </style>

  <script>
    window.RufflePlayer = window.RufflePlayer || {};
  </script>
  <script src="ruffle/ruffle.js"></script>
</head>
<body>
  <div id="game-shell">
    <div id="game-frame"></div>
  </div>

  <script>
    const shell = document.getElementById("game-shell");
    const frame = document.getElementById("game-frame");

    window.addEventListener("DOMContentLoaded", async () => {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      frame.appendChild(player);

      await player.ruffle().load("diner-dash.swf");

      // Focus helps some games receive input more consistently
      if (player.focus) player.focus();

      function dispatchToPlayer(type, touch) {
        const rect = player.getBoundingClientRect();

        const clientX = Math.min(Math.max(touch.clientX, rect.left + 1), rect.right - 1);
        const clientY = Math.min(Math.max(touch.clientY, rect.top + 1), rect.bottom - 1);

        const evt = new MouseEvent(type, {
          bubbles: true,
          cancelable: true,
          composed: true,
          view: window,
          clientX,
          clientY,
          screenX: touch.screenX || clientX,
          screenY: touch.screenY || clientY,
          button: 0,
          buttons: type === "mouseup" || type === "click" ? 0 : 1
        });

        player.dispatchEvent(evt);
      }

      shell.addEventListener("touchstart", (e) => {
        e.preventDefault();
        const t = e.changedTouches[0];
        dispatchToPlayer("mousemove", t);
        dispatchToPlayer("mousedown", t);
        if (player.focus) player.focus();
      }, { passive: false });

      shell.addEventListener("touchmove", (e) => {
        e.preventDefault();
        const t = e.changedTouches[0];
        dispatchToPlayer("mousemove", t);
      }, { passive: false });

      shell.addEventListener("touchend", (e) => {
        e.preventDefault();
        const t = e.changedTouches[0];
        dispatchToPlayer("mouseup", t);
        dispatchToPlayer("click", t);
      }, { passive: false });

      shell.addEventListener("touchcancel", (e) => {
        e.preventDefault();
        const t = e.changedTouches[0];
        dispatchToPlayer("mouseup", t);
      }, { passive: false });

      // Prevent iOS long-press menu behavior over the game area
      shell.addEventListener("contextmenu", (e) => e.preventDefault());
    });
  </script>
</body>
</html>
